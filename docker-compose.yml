services:
  backend:
    build: ./backend
    environment:
      - ALLOWED_ORIGINS=*
      - MAX_CONCURRENT_TASKS=3
      - YTDLP_COOKIES_FILE=/app/cookies/bilibili_cookies.txt
      - YTDLP_PROXY=${YTDLP_PROXY:-}
    dns:
      - 223.5.5.5
      - 1.1.1.1
      - 8.8.8.8
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      - ./backend/downloads:/app/downloads
      - ./backend/cookies:/app/cookies
    ports:
      - "8000:8000"

  frontend:
    build: ./frontend
    ports:
      - "5173:80"

  gateway:
    image: nginx:1.27-alpine
    depends_on:
      - backend
      - frontend
    volumes:
      - ./deploy/nginx.conf:/etc/nginx/nginx.conf:ro
    ports:
      - "80:80"
